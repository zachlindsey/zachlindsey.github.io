<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zach</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    /* ─── tokens ──────────────────────────────────────────── */
    :root {
      --bg:          #111010;
      --bg-subtle:   #161512;
      --border:      #1a1916;
      --text:        #c9c2b8;
      --text-muted:  #7a7368;
      --text-dim:    #4a4540;
      --text-bright: #f0e8de;
      --text-mid:    #a89a8a;
      --accent:      #e8a74a;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }

    /* ─── reset ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── base ────────────────────────────────────────────── */
    html { font-size: 16px; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }

    /* ─── layout ──────────────────────────────────────────── */
    .site-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ─── nav ─────────────────────────────────────────────── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: var(--mono);
      font-size: 14px;
      color: var(--accent);
      letter-spacing: 0.02em;
    }
    .nav-links {
      display: flex;
      gap: 28px;
      list-style: none;
    }
    .nav-links a {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 0.04em;
      transition: color 0.15s;
    }
    .nav-links a:hover,
    .nav-links a.active { color: var(--accent); }

    /* ─── pages ───────────────────────────────────────────── */
    .page { display: none; padding: 56px 0 64px; }
    .page.active { display: block; }

    .section-label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    /* ─── home ────────────────────────────────────────────── */
    .home-eyebrow {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .home-name {
      font-family: var(--mono);
      font-size: 40px;
      font-weight: 500;
      color: var(--text-bright);
      line-height: 1.1;
      letter-spacing: -0.01em;
      margin-bottom: 18px;
    }
    .home-sub {
      font-size: 15px;
      font-weight: 300;
      color: var(--text-muted);
      line-height: 1.75;
      max-width: 480px;
      margin-bottom: 40px;
    }
    .home-sub em {
      color: var(--text-mid);
      font-style: normal;
    }
    .divider {
      width: 36px;
      height: 1px;
      background: var(--accent);
      opacity: 0.4;
      margin-bottom: 36px;
    }
    .now-label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .now-list {
      border-left: 2px solid #221f1a;
      padding-left: 16px;
    }
    .now-list p {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.9;
    }
    .now-list p span {
      color: var(--text-mid);
    }

    /* ─── projects ────────────────────────────────────────── */
    .proj-list { display: flex; flex-direction: column; }
    .proj-item {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: start;
      gap: 16px;
      padding: 22px 0;
      border-bottom: 1px solid var(--border);
    }
    .proj-item:first-child { border-top: 1px solid var(--border); }
    .proj-name {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-bright);
      margin-bottom: 6px;
    }
    .proj-desc {
      font-size: 13px;
      font-weight: 300;
      color: var(--text-dim);
      line-height: 1.65;
    }
    .proj-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }
    .proj-tag {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      border: 1px solid #221f1a;
      border-radius: 3px;
      padding: 2px 7px;
      letter-spacing: 0.04em;
    }
    .proj-link {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      opacity: 0.6;
      transition: opacity 0.15s;
      white-space: nowrap;
      padding-top: 2px;
    }
    .proj-link:hover { opacity: 1; }

    /* ─── writing ─────────────────────────────────────────── */
    .post-list { display: flex; flex-direction: column; }
    .post-item {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 20px;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .post-item:first-child { border-top: 1px solid var(--border); }
    .post-date {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      line-height: 1.6;
      padding-top: 2px;
    }
    .post-title {
      font-size: 14px;
      color: var(--text);
      line-height: 1.45;
      margin-bottom: 5px;
      transition: color 0.15s;
    }
    .post-item:hover .post-title { color: var(--accent); }
    .post-summary {
      font-size: 12px;
      font-weight: 300;
      color: var(--text-dim);
      line-height: 1.65;
    }
    .post-tag {
      display: inline-block;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent);
      opacity: 0.55;
      margin-top: 7px;
      letter-spacing: 0.04em;
    }

    /* ─── about ───────────────────────────────────────────── */
    .about-body { max-width: 520px; }
    .about-body p {
      font-size: 14px;
      font-weight: 300;
      color: var(--text-muted);
      line-height: 1.9;
      margin-bottom: 20px;
    }
    .about-body p em {
      color: var(--text-mid);
      font-style: normal;
    }
    .about-links {
      display: flex;
      gap: 24px;
      margin-top: 36px;
    }
    .about-link {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--accent);
      opacity: 0.65;
      transition: opacity 0.15s;
    }
    .about-link:hover { opacity: 1; }

    /* ─── responsive ──────────────────────────────────────── */
    @media (max-width: 480px) {
      .home-name { font-size: 28px; }
      .nav-links { gap: 16px; }
      .post-item { grid-template-columns: 56px 1fr; gap: 12px; }
    }
  </style>
</head>
<body>
  <div class="site-wrap">
    <nav>
      <span class="nav-logo">zach</span>
      <ul class="nav-links">
        <li><a href="#" class="active" onclick="show('home', this); return false;">home</a></li>
        <li><a href="#" onclick="show('projects', this); return false;">projects</a></li>
        <li><a href="#" onclick="show('writing', this); return false;">writing</a></li>
        <li><a href="#" onclick="show('about', this); return false;">about</a></li>
      </ul>
    </nav>

    $body$

  </div><!-- /site-wrap -->

  <script>
    function show(id, el) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      el.classList.add('active');
    }
  </script>
</body>
</html>
